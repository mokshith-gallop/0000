# AC4: Partition + cluster + key intent per locked Performance Optimization
# Verifies every table's partition strategy, clustering columns, and table
# options match the locked decision, read from the target catalog after DDL
# application.
# Pattern: schema_conformance (target-only)
# Pass rule: 87/87 partitioned tables match; 13/13 unpartitioned confirmed;
#   all clustering columns correct; fact_interaction require_partition_filter=true.
name: ac4_partition_cluster

connections:
  source: { engine: impala }
  target: { engine: bigquery }

migration:
  dataset_map:
    nbcs_staging: dmt_build_staging
    nbcs_ods: dmt_build_ods
    nbcs_dm: dmt_build_dm
  steps:
    - { kind: ddl, dataset: dmt_build_staging, sql: ddl/nbcs_staging.sql }
    - { kind: ddl, dataset: dmt_build_ods,     sql: ddl/nbcs_ods.sql }
    - { kind: ddl, dataset: dmt_build_dm,      sql: ddl/nbcs_dm.sql }

suites:

