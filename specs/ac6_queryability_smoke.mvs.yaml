# AC6: Queryability smoke
# SELECT * succeeds for each of the 100 tables AND one representative query
# per dataset tier runs with 0 type-coercion errors.
# Pattern: query_performance (mode: measure)
# Pass rule: 100/100 SELECT * succeed; 3/3 representative tier queries succeed
#   with 0 errors.
name: ac6_queryability_smoke

connections:
  source: { engine: impala }
  target: { engine: bigquery }

migration:
  dataset_map:
    nbcs_staging: dmt_build_staging
    nbcs_ods: dmt_build_ods
    nbcs_dm: dmt_build_dm
  steps:
    - { kind: ddl, dataset: dmt_build_staging, sql: ddl/nbcs_staging.sql }
    - { kind: ddl, dataset: dmt_build_ods,     sql: ddl/nbcs_ods.sql }
    - { kind: ddl, dataset: dmt_build_dm,      sql: ddl/nbcs_dm.sql }

suites:
  - pattern: query_performance
    id: ac6-queryability
    queries:

