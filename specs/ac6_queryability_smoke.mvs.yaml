      # ── Representative tier queries (3) ──

      # Staging: epoch BIGINT + STRING columns with DATE partition filter
      - id: tier-staging-stg-tel-call
        mode: measure
        sql: >
          SELECT load_date, start_epoch, ani, disposition_code
          FROM dmt_build_staging.stg_tel_call
          WHERE load_date = DATE '2026-06-01'
          LIMIT 10

      # ODS: JOIN exercising INT64 join types + TIMESTAMP + DATE partition
      - id: tier-ods-call-join-queue
        mode: measure
        sql: >
          SELECT c.call_id, c.start_ts, c.talk_seconds, q.queue_name
          FROM dmt_build_ods.ods_call c
          JOIN dmt_build_ods.ods_queue q ON c.queue_id = q.queue_id
          WHERE c.call_date = DATE '2026-06-01'
          LIMIT 10

      # DM: JOIN exercising INT64 surrogate key + RANGE_BUCKET partition
      - id: tier-dm-interaction-join-agent
        mode: measure
        sql: >
          SELECT f.interaction_id, a.full_name, f.start_ts, f.channel
          FROM dmt_build_dm.fact_interaction f
          JOIN dmt_build_dm.dim_agent a ON f.agent_sk = a.agent_sk
          WHERE f.date_key BETWEEN 20260601 AND 20260630
          LIMIT 10
