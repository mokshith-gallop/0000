          - { name: shift_id, type: INT64 }
      - table: ods_call
        columns:
          - { name: call_id, type: INT64 }
          - { name: queue_id, type: INT64 }
          - { name: agent_id, type: INT64 }
          - { name: program_id, type: INT64 }
      - table: ods_interaction
        columns:
          - { name: interaction_id, type: STRING }
          - { name: program_id, type: INT64 }
          - { name: queue_id, type: INT64 }
          - { name: agent_id, type: INT64 }
          - { name: customer_ref, type: STRING }
      - table: ods_ivr_session
        columns:
          - { name: session_ref, type: STRING }
      - table: ods_chat_session
        columns:
          - { name: chat_ref, type: STRING }
      - table: ods_survey_response
        columns:
          - { name: survey_id, type: STRING }
          - { name: interaction_ref, type: STRING }
      - table: ods_agent_scd2
        columns:
          - { name: agent_id, type: INT64 }
          - { name: org_unit_id, type: INT64 }
      - table: ods_agent_skill_scd2
        columns:
          - { name: agent_id, type: INT64 }
          - { name: skill_id, type: INT64 }
      - table: ods_agent_assignment_scd2
        columns:
