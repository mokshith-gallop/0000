          - { name: client_id, type: INT64 }
      - table: ods_agent_acid
        columns:
          - { name: agent_id, type: INT64 }
          - { name: org_unit_id, type: INT64 }
      - table: ods_ticket_acid
        columns:
          - { name: ticket_id, type: INT64 }
          - { name: program_id, type: INT64 }
          - { name: category_id, type: INT64 }
          - { name: assigned_agent_id, type: INT64 }
      - table: ods_invoice_acid
        columns:
          - { name: invoice_id, type: INT64 }
          - { name: client_id, type: INT64 }
          - { name: program_id, type: INT64 }
      - table: ods_timesheet
        columns:
          - { name: timesheet_id, type: INT64 }
          - { name: agent_id, type: INT64 }
          - { name: program_id, type: INT64 }
      - table: ods_sla_credit
        columns:
