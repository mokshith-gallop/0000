          - { name: program_id, type: INT64 }
          - { name: sla_target_id, type: INT64 }
      - table: ods_callback_request
        columns:
          - { name: callback_id, type: INT64 }
          - { name: call_id, type: INT64 }
          - { name: queue_id, type: INT64 }
      - table: ods_ticket_worklog
        columns:
          - { name: worklog_id, type: INT64 }
          - { name: ticket_id, type: INT64 }
          - { name: agent_id, type: INT64 }
      - table: ods_attrition_event
        columns:
          - { name: attrition_event_id, type: INT64 }
          - { name: agent_id, type: INT64 }
      - table: ods_rate_card
        columns:
          - { name: rate_card_id, type: INT64 }
          - { name: program_id, type: INT64 }

  # DM: surrogate-key dimensions + FK columns on facts/aggs
  - pattern: schema_conformance
    id: ac5-dm-sk-fk-columns
    target_dataset: dmt_build_dm
    tables:
      - table: dim_date
        columns:
          - { name: date_key, type: INT64 }
      - table: dim_agent
        columns:
          - { name: agent_sk, type: INT64 }
          - { name: agent_id, type: INT64 }
      - table: dim_client
        columns:
          - { name: client_sk, type: INT64 }
          - { name: client_id, type: INT64 }
      - table: dim_program
        columns:
          - { name: program_sk, type: INT64 }
          - { name: program_id, type: INT64 }
          - { name: client_id, type: INT64 }
      - table: dim_queue
        columns:
          - { name: queue_sk, type: INT64 }
          - { name: queue_id, type: INT64 }
          - { name: program_id, type: INT64 }
      - table: dim_site
        columns:
          - { name: site_sk, type: INT64 }
      - table: dim_shift
        columns:
          - { name: shift_sk, type: INT64 }
          - { name: shift_id, type: INT64 }
      - table: dim_org
