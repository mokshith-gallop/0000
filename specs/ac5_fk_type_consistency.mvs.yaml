      - table: fact_ivr_path
        columns:
          - { name: session_ref, type: STRING }
          - { name: date_key, type: INT64 }
      - table: agg_agent_daily
        columns:
          - { name: agent_sk, type: INT64 }
          - { name: date_key, type: INT64 }
      - table: agg_agent_weekly
