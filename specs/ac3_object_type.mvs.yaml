# AC3: Object-type fidelity
# Proves every source table lands as BigQuery BASE TABLE; no source table is
# silently created as a view. The 15 source views are out-of-scope and must
# not appear as tables in nbcs_dm.
# Pattern: schema_conformance (target-only — no source_setup)
# Pass rule: 100/100 source tables landed as BASE TABLE; 0 view-to-table flips.
name: ac3_object_type

connections:
  source: { engine: impala }
  target: { engine: bigquery }

migration:
  dataset_map:
    nbcs_staging: dmt_build_staging
    nbcs_ods: dmt_build_ods
    nbcs_dm: dmt_build_dm
  steps:
    - { kind: ddl, dataset: dmt_build_staging, sql: ddl/nbcs_staging.sql }
    - { kind: ddl, dataset: dmt_build_ods,     sql: ddl/nbcs_ods.sql }
    - { kind: ddl, dataset: dmt_build_dm,      sql: ddl/nbcs_dm.sql }

suites:

  # staging: 45 tables, all must be BASE TABLE
